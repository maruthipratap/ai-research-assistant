name: CI

# Runs automatically on every push to main, and on every pull request
# targeting main - this is the actual definition of "continuous
# integration": every change gets verified automatically, instead of
# someone remembering to test it by hand.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

  frontend:
    name: Frontend - install and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # This is the real test here - if there's a JS/JSX error anywhere,
      # the Vite build fails and so does this job.
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  docker:
    name: Docker - build images
    runs-on: ubuntu-latest
    # Only bother building Docker images if the plain installs/build
    # already succeeded - no point spending time on Docker if the basics
    # are already broken.
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ai-research-assistant-backend ./backend

      - name: Build frontend image
        run: docker build -t ai-research-assistant-frontend ./frontend