server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # React Router uses client-side routing (e.g. /chat, /dashboard) - these
  # paths don't exist as real files, so nginx needs to fall back to
  # index.html and let React's router handle it. Without this, refreshing
  # the page on /chat would 404.
  location / {
    try_files $uri /index.html;
  }
}