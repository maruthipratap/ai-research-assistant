services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      # Persists uploaded files outside the container - without this,
      # every uploaded PDF would vanish the moment the container is
      # rebuilt or removed, since the container's own filesystem is
      # thrown away with it.
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend